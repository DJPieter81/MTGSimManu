<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MTG Match — Play by Play</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: #0f0f1a; color: #e0e0e0; padding: 20px; max-width: 1400px; margin: 0 auto; }
  h1 { color: #e94560; margin-bottom: 8px; }
  .match-info { color: #888; margin-bottom: 20px; font-size: 0.95rem; }
  .game-tabs { display: flex; gap: 4px; margin-bottom: 0; }
  .game-tab { padding: 10px 24px; background: #1a1a2e; border: 1px solid #333; border-bottom: none; border-radius: 8px 8px 0 0; cursor: pointer; color: #888; font-weight: 600; }
  .game-tab.active { background: #16213e; color: #e94560; border-color: #e94560; }
  .game-tab .winner { font-size: 0.75rem; display: block; color: #4ade80; }
  .game-tab .loser { font-size: 0.75rem; display: block; color: #ef4444; }
  .game-panel { display: none; background: #16213e; border: 1px solid #333; border-radius: 0 8px 8px 8px; padding: 16px; }
  .game-panel.active { display: block; }
  .game-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid #333; }
  .game-result { font-weight: 700; font-size: 1.1rem; }
  .game-stats { color: #888; font-size: 0.85rem; }

  table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
  thead th { background: #0f3460; color: #e94560; padding: 8px 6px; text-align: left; position: sticky; top: 0; z-index: 5; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.5px; }
  tbody tr { border-bottom: 1px solid #1a1a2e; transition: background 0.15s; }
  tbody tr:hover { background: rgba(233,69,96,0.08); }
  tbody tr.storm-row { background: rgba(239,68,68,0.05); }
  tbody tr.boros-row { background: rgba(251,191,36,0.05); }
  tbody tr.attack-row { background: rgba(239,68,68,0.12); }
  tbody tr.lethal-row { background: rgba(74,222,128,0.15); }
  td { padding: 6px; vertical-align: top; border-bottom: 1px solid #1a1a2e; }

  .turn-cell { font-weight: 700; color: #888; text-align: center; width: 30px; }
  .who-cell { font-weight: 700; width: 55px; }
  .who-storm { color: #ef4444; }
  .who-boros { color: #fbbf24; }
  .life-cell { text-align: center; width: 36px; font-weight: 700; }
  .life-storm { color: #ef4444; }
  .life-boros { color: #fbbf24; }
  .life-low { color: #ef4444 !important; font-weight: 900; }

  .board-cell { max-width: 180px; font-size: 0.78rem; }
  .card-pill { display: inline-block; background: #0f3460; border: 1px solid #333; border-radius: 4px; padding: 1px 5px; margin: 1px; font-size: 0.72rem; white-space: nowrap; }
  .card-pill.creature { border-left: 2px solid #4ade80; }
  .card-pill.permanent { border-left: 2px solid #a78bfa; }
  .card-pill.pt { color: #4ade80; font-weight: 600; }

  .hand-cell { max-width: 200px; font-size: 0.78rem; color: #94a3b8; }
  .hand-card { display: inline-block; background: #1e293b; border-radius: 3px; padding: 1px 4px; margin: 1px; font-size: 0.7rem; }
  .hand-card.land { color: #a78bfa; }

  .action-cell { font-weight: 500; min-width: 200px; }
  .action-land { color: #a78bfa; }
  .action-spell { color: #fbbf24; }
  .action-attack { color: #ef4444; font-weight: 700; }
  .action-lethal { color: #4ade80; font-weight: 900; }
  .action-target { color: #94a3b8; }

  .ev-cell { text-align: center; width: 45px; font-weight: 600; }
  .ev-high { color: #4ade80; }
  .ev-low { color: #94a3b8; }
  .ev-lethal { color: #4ade80; font-weight: 900; font-size: 0.9rem; }

  .reasoning-cell { color: #64748b; font-size: 0.75rem; max-width: 250px; }
  .alt-card { color: #94a3b8; }

  .turn-separator td { border-top: 2px solid #333; }

  .score-badge { display: inline-block; background: #e94560; color: white; padding: 2px 10px; border-radius: 10px; font-weight: 700; font-size: 0.8rem; margin-left: 8px; }
</style>
</head>
<body>
<h1>MTG Match — Play by Play</h1>
<div class="match-info" id="matchInfo"></div>
<div class="game-tabs" id="tabs"></div>
<div id="panels"></div>

<script>
async function load() {
  const d = await (await fetch('match_playbyplay.json')).json();

  document.getElementById('matchInfo').innerHTML =
    `<b>${d.deck1}</b> vs <b>${d.deck2}</b> — ${d.match_winner} wins ${Math.max(...d.match_score)}–${Math.min(...d.match_score)}`;

  const tabs = document.getElementById('tabs');
  const panels = document.getElementById('panels');

  d.games.forEach((g, gi) => {
    const isStormWin = g.winner.includes('Storm');
    const tab = document.createElement('div');
    tab.className = `game-tab ${gi===0?'active':''}`;
    tab.innerHTML = `Game ${g.game_num} <span class="${isStormWin?'winner':'loser'}">${g.winner.split(' ').pop()} T${g.turns}</span>`;
    tab.onclick = () => {
      document.querySelectorAll('.game-tab').forEach(t=>t.classList.remove('active'));
      document.querySelectorAll('.game-panel').forEach(p=>p.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById('panel'+gi).classList.add('active');
    };
    tabs.appendChild(tab);

    const panel = document.createElement('div');
    panel.className = `game-panel ${gi===0?'active':''}`;
    panel.id = 'panel'+gi;

    const header = `<div class="game-header">
      <div class="game-result">${g.winner} wins in ${g.turns} turns (${g.win_condition})</div>
      <div class="game-stats">Storm: ${g.storm_spells} spells, final ${g.storm_final_life}♥ | Boros: ${g.boros_spells} spells, final ${g.boros_final_life}♥
        <span class="score-badge">${g.score[0]}–${g.score[1]}</span>
      </div>
    </div>`;

    let tableRows = '';
    let lastTurn = -1;
    g.rows.forEach(r => {
      const isStorm = r.who === 'Storm';
      const isAttack = r.action_type === 'attack';
      const isLethal = r.reasoning && r.reasoning.includes('LETHAL');
      const turnSep = r.turn !== lastTurn ? ' turn-separator' : '';
      lastTurn = r.turn;

      const cls = isLethal ? 'lethal-row' : isAttack ? 'attack-row' : isStorm ? 'storm-row' : 'boros-row';

      // Board pills
      const boardHtml = (cards) => cards.map(c => {
        const type = c.is_creature ? 'creature' : 'permanent';
        const pt = c.is_creature ? ` <span class="pt">${c.power}/${c.toughness}</span>` : '';
        return `<span class="card-pill ${type}">${c.name}${pt}</span>`;
      }).join('') || '<span style="color:#444">—</span>';

      // Hand pills
      const handHtml = (cards) => {
        if (!cards || !cards.length) return '';
        const spells = cards.filter(c=>!c.is_land).slice(0,4);
        const lands = cards.filter(c=>c.is_land).length;
        let h = spells.map(c=>`<span class="hand-card">${c.name}</span>`).join('');
        const extra = cards.filter(c=>!c.is_land).length - 4;
        if (extra > 0) h += `<span class="hand-card">+${extra}</span>`;
        if (lands) h += `<span class="hand-card land">${lands}L</span>`;
        return h;
      };

      // Action
      let actionCls = 'action-spell';
      if (r.action_type === 'land') actionCls = 'action-land';
      if (r.action_type === 'attack') actionCls = isLethal ? 'action-lethal' : 'action-attack';

      // EV
      let evHtml = '';
      if (r.ev !== undefined && r.ev !== null) {
        const evCls = r.ev >= 100 ? 'ev-lethal' : r.ev >= 15 ? 'ev-high' : 'ev-low';
        evHtml = `<span class="${evCls}">${r.ev}</span>`;
      }

      // Reasoning
      let reasonHtml = r.reasoning || '';
      if (r.alternatives && r.alternatives.length) {
        reasonHtml += '<br>' + r.alternatives.map(a=>`<span class="alt-card">${a.name}(${a.ev})</span>`).join(' ');
      }

      const sLife = r.storm_life;
      const bLife = r.boros_life;

      tableRows += `<tr class="${cls}${turnSep}">
        <td class="turn-cell">${r.turn}</td>
        <td class="who-cell ${isStorm?'who-storm':'who-boros'}">${r.who}</td>
        <td class="life-cell life-storm ${sLife<=5?'life-low':''}">${sLife}</td>
        <td class="life-cell life-boros ${bLife<=5?'life-low':''}">${bLife}</td>
        <td class="board-cell">${boardHtml(r.storm_board||[])}</td>
        <td class="board-cell">${boardHtml(r.boros_board||[])}</td>
        <td class="hand-cell">${handHtml(r.hand)}</td>
        <td class="action-cell ${actionCls}">${r.action}</td>
        <td class="ev-cell">${evHtml}</td>
        <td class="reasoning-cell">${reasonHtml}</td>
      </tr>`;
    });

    panel.innerHTML = header + `<table>
      <thead><tr>
        <th>T</th><th>Who</th><th>S♥</th><th>B♥</th>
        <th>Storm Board</th><th>Boros Board</th><th>Hand</th>
        <th>Action</th><th>EV</th><th>Reasoning</th>
      </tr></thead>
      <tbody>${tableRows}</tbody>
    </table>`;
    panels.appendChild(panel);
  });
}
load();
</script>
</body>
</html>
