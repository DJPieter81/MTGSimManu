<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MTG Match — Play by Play</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: #1a1b26; color: #c0caf5; padding: 24px; max-width: 1500px; margin: 0 auto; line-height: 1.5; }
  h1 { color: #c0caf5; font-weight: 400; font-size: 1.4rem; margin-bottom: 4px; }
  .match-info { color: #565f89; margin-bottom: 20px; font-size: 0.9rem; }
  .match-info b { color: #c0caf5; }

  .game-tabs { display: flex; gap: 2px; margin-bottom: 0; }
  .game-tab { padding: 8px 20px; background: #24283b; border: 1px solid #3b4261; border-bottom: none; border-radius: 6px 6px 0 0; cursor: pointer; color: #565f89; font-size: 0.85rem; }
  .game-tab.active { background: #1f2335; color: #c0caf5; border-color: #7aa2f7; }
  .game-tab .sub { font-size: 0.72rem; display: block; margin-top: 2px; }
  .game-tab .win { color: #9ece6a; }
  .game-tab .loss { color: #f7768e; }

  .game-panel { display: none; background: #1f2335; border: 1px solid #3b4261; border-radius: 0 6px 6px 6px; padding: 16px; }
  .game-panel.active { display: block; }
  .game-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; padding-bottom: 10px; border-bottom: 1px solid #3b4261; }
  .game-result { font-weight: 500; font-size: 1rem; color: #c0caf5; }
  .game-stats { color: #565f89; font-size: 0.8rem; }
  .score-badge { display: inline-block; background: #3b4261; color: #c0caf5; padding: 2px 10px; border-radius: 10px; font-weight: 600; font-size: 0.75rem; margin-left: 8px; }

  table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
  thead th { background: #24283b; color: #7aa2f7; padding: 8px 6px; text-align: left; position: sticky; top: 0; z-index: 5; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 500; border-bottom: 2px solid #3b4261; }
  tbody tr { border-bottom: 1px solid rgba(59,66,97,0.5); }
  tbody tr:hover { background: rgba(122,162,247,0.04); }
  td { padding: 5px 6px; vertical-align: top; }

  /* Subtle row tinting — barely visible, just enough to track */
  tbody tr.p1-row { }
  tbody tr.p2-row { background: rgba(255,255,255,0.015); }
  tbody tr.attack-row { background: rgba(247,118,142,0.06); }
  tbody tr.lethal-row { background: rgba(158,206,106,0.08); }
  tbody tr.turn-start td { border-top: 1px solid #3b4261; }

  .turn-cell { color: #565f89; text-align: center; width: 28px; font-variant-numeric: tabular-nums; }
  .who-cell { width: 52px; font-weight: 600; font-size: 0.78rem; }
  .who-p1 { color: #f7768e; }
  .who-p2 { color: #e0af68; }

  .life-cell { text-align: center; width: 32px; font-variant-numeric: tabular-nums; }
  .life-p1 { color: #f7768e; }
  .life-p2 { color: #e0af68; }
  .life-danger { color: #f7768e !important; font-weight: 700; }

  .board-cell { max-width: 200px; }
  .card-tag { display: inline-block; background: #24283b; border: 1px solid #3b4261; border-radius: 3px; padding: 1px 5px; margin: 1px; font-size: 0.7rem; white-space: nowrap; }
  .card-tag.creature { border-left: 2px solid #9ece6a; }
  .card-tag.other { border-left: 2px solid #bb9af7; }
  .card-tag .pt { color: #9ece6a; margin-left: 2px; }
  .empty-board { color: #3b4261; font-style: italic; font-size: 0.7rem; }

  .hand-cell { max-width: 220px; }
  .hand-tag { display: inline-block; background: #1a1b26; border-radius: 3px; padding: 1px 4px; margin: 1px; font-size: 0.68rem; color: #7982a9; }
  .hand-tag.land { color: #bb9af7; opacity: 0.7; }

  .action-cell { min-width: 220px; }
  .act-land { color: #bb9af7; }
  .act-spell { color: #e0af68; }
  .act-attack { color: #f7768e; }
  .act-lethal { color: #9ece6a; font-weight: 600; }
  .act-target { color: #565f89; font-size: 0.75rem; }

  /* AI Reasoning — the key column, make it readable */
  .reason-cell { max-width: 320px; font-size: 0.76rem; line-height: 1.4; }
  .reason-summary { color: #9aa5ce; }
  .reason-good { color: #9ece6a; }
  .reason-neutral { color: #7982a9; }
  .reason-bar { display: inline-block; height: 6px; border-radius: 3px; margin-right: 4px; vertical-align: middle; }
  .reason-bar.high { background: #9ece6a; }
  .reason-bar.mid { background: #e0af68; }
  .reason-bar.low { background: #565f89; }
  .alt-list { margin-top: 3px; padding-left: 0; }
  .alt-item { color: #565f89; font-size: 0.7rem; }
  .alt-item .name { color: #7982a9; }
  .alt-item .score { font-variant-numeric: tabular-nums; }
</style>

<script>
function describeEV(ev, action_type, action, alternatives, who) {
  if (action_type === 'land') return '<span class="reason-neutral">Develop mana</span>';
  if (action_type === 'attack') {
    if (action.includes('LETHAL')) return '<span class="reason-good">Lethal damage on board</span>';
    return '<span class="reason-neutral">Push damage</span>';
  }
  if (ev === undefined || ev === null) return '';

  // Describe what the EV means in plain english
  let quality, desc;
  if (ev >= 100) { quality = 'high'; desc = 'Lethal — wins the game immediately'; }
  else if (ev >= 30) { quality = 'high'; desc = 'Excellent play — high-impact spell'; }
  else if (ev >= 20) { quality = 'high'; desc = 'Strong play — significant board impact'; }
  else if (ev >= 12) { quality = 'mid'; desc = 'Good play — solid value for mana spent'; }
  else if (ev >= 5) { quality = 'mid'; desc = 'Decent play — marginal advantage'; }
  else if (ev >= 0) { quality = 'low'; desc = 'Marginal — barely worth casting'; }
  else { quality = 'low'; desc = 'Suboptimal — may be forced play'; }

  // Bar width proportional to EV (cap at 100)
  const barW = Math.min(Math.max(ev / 2, 3), 50);
  let html = `<span class="reason-bar ${quality}" style="width:${barW}px"></span>`;
  html += `<span class="reason-summary">${desc}</span>`;

  // Alternatives in plain english
  if (alternatives && alternatives.length > 0) {
    html += '<div class="alt-list">';
    alternatives.forEach(a => {
      const diff = ev - a.ev;
      let cmp;
      if (diff > 10) cmp = 'much better than';
      else if (diff > 3) cmp = 'better than';
      else if (diff > -3) cmp = 'similar to';
      else cmp = 'worse than';
      // Only show if there's a meaningful alternative
      if (Math.abs(diff) > 1) {
        html += `<div class="alt-item">Chose over <span class="name">${a.name}</span> (${cmp})</div>`;
      }
    });
    html += '</div>';
  }
  return html;
}

function boardHtml(cards) {
  if (!cards || !cards.length) return '<span class="empty-board">empty</span>';
  return cards.map(c => {
    const cls = c.is_creature ? 'creature' : 'other';
    const pt = c.is_creature ? `<span class="pt">${c.power}/${c.toughness}</span>` : '';
    return `<span class="card-tag ${cls}">${c.name} ${pt}</span>`;
  }).join('');
}

function handHtml(cards) {
  if (!cards || !cards.length) return '';
  const spells = cards.filter(c => !c.is_land);
  const lands = cards.filter(c => c.is_land).length;
  let h = spells.slice(0, 4).map(c => `<span class="hand-tag">${c.name}</span>`).join('');
  if (spells.length > 4) h += `<span class="hand-tag">+${spells.length - 4}</span>`;
  if (lands) h += `<span class="hand-tag land">${lands} land${lands>1?'s':''}</span>`;
  return h;
}
