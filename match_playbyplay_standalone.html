<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Match Play-by-Play</title>
<style>
  :root {
    --bg: #1e1e2e;
    --surface: #252536;
    --surface2: #2a2a3c;
    --border: #3a3a50;
    --text: #cdd6f4;
    --text2: #a6adc8;
    --text3: #6c7086;
    --p1: #f38ba8;
    --p2: #f9e2af;
    --green: #a6e3a1;
    --blue: #89b4fa;
    --purple: #cba6f7;
    --red: #f38ba8;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 24px 32px;
    max-width: 1500px;
    margin: 0 auto;
    line-height: 1.6;
    font-size: 14px;
  }

  h1 {
    font-size: 1.3rem;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 4px;
  }

  .info {
    color: var(--text3);
    margin-bottom: 20px;
    font-size: 0.9rem;
  }
  .info b { color: var(--text); font-weight: 500; }

  /* ── Tabs ── */
  .tabs { display: flex; gap: 3px; }
  .tab {
    padding: 8px 22px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-bottom: none;
    border-radius: 8px 8px 0 0;
    cursor: pointer;
    color: var(--text3);
    font-size: 0.85rem;
    line-height: 1.4;
  }
  .tab:hover { color: var(--text2); }
  .tab.active {
    background: var(--surface2);
    color: var(--text);
    border-color: var(--blue);
    border-bottom-color: var(--surface2);
  }
  .tab small { display: block; font-size: 0.72rem; margin-top: 1px; }

  /* ── Panel ── */
  .panel {
    display: none;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-top-color: var(--blue);
    border-radius: 0 8px 8px 8px;
    padding: 20px;
  }
  .panel.active { display: block; }

  .header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 16px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }
  .header-result { font-weight: 500; font-size: 0.95rem; }
  .header-stats { color: var(--text3); font-size: 0.8rem; }
  .badge {
    display: inline-block;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 1px 10px;
    border-radius: 10px;
    font-weight: 600;
    font-size: 0.75rem;
    margin-left: 8px;
  }

  /* ── Table ── */
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.82rem;
  }

  thead th {
    background: var(--surface);
    color: var(--blue);
    padding: 10px 8px;
    text-align: left;
    position: sticky;
    top: 0;
    z-index: 5;
    font-size: 0.7rem;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    border-bottom: 2px solid var(--border);
  }

  tbody td {
    padding: 7px 8px;
    vertical-align: top;
    border-bottom: 1px solid rgba(58, 58, 80, 0.5);
  }

  tbody tr:hover { background: rgba(137, 180, 250, 0.03); }

  /* Turn separator */
  tr.turn-start td { border-top: 2px solid var(--border); }

  /* Row types — very subtle */
  tr.atk { background: rgba(243, 139, 168, 0.04); }
  tr.lethal { background: rgba(166, 227, 161, 0.06); }

  /* ── Turn number ── */
  .col-turn {
    color: var(--text3);
    text-align: center;
    width: 30px;
    font-variant-numeric: tabular-nums;
    font-weight: 600;
  }

  /* ── Player name ── */
  .col-who { width: 60px; font-weight: 600; font-size: 0.8rem; }
  .col-who.p1 { color: var(--p1); }
  .col-who.p2 { color: var(--p2); }

  /* ── Life totals ── */
  .col-life {
    text-align: center;
    width: 34px;
    font-variant-numeric: tabular-nums;
    font-weight: 500;
  }
  .col-life.p1 { color: var(--p1); }
  .col-life.p2 { color: var(--p2); }
  .col-life.danger { color: var(--red) !important; font-weight: 700; }

  /* ── Board cards ── */
  .col-board { max-width: 210px; }
  .card {
    display: inline-block;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 2px 6px;
    margin: 1px;
    font-size: 0.72rem;
    white-space: nowrap;
  }
  .card.creature { border-left: 3px solid var(--green); }
  .card.other { border-left: 3px solid var(--purple); }
  .card .pt { color: var(--green); font-weight: 600; margin-left: 3px; }
  .empty { color: var(--border); font-style: italic; font-size: 0.72rem; }

  /* ── Hand ── */
  .col-hand { max-width: 230px; }
  .hcard {
    display: inline-block;
    background: var(--bg);
    border-radius: 3px;
    padding: 1px 5px;
    margin: 1px;
    font-size: 0.7rem;
    color: var(--text2);
  }
  .hcard.land { color: var(--purple); opacity: 0.6; }

  /* ── Action ── */
  .col-action { min-width: 230px; line-height: 1.5; }
  .col-action.land { color: var(--purple); }
  .col-action.spell { color: var(--p2); }
  .col-action.attack { color: var(--p1); }
  .col-action.lethal { color: var(--green); font-weight: 600; }

  /* ── AI Reasoning ── */
  .col-reason {
    max-width: 340px;
    line-height: 1.5;
    font-size: 0.78rem;
  }
  .chain-badge {
    display: inline-block;
    background: rgba(243, 139, 168, 0.12);
    color: var(--p1);
    border: 1px solid rgba(243, 139, 168, 0.25);
    border-radius: 4px;
    padding: 0 5px;
    font-size: 0.68rem;
    font-weight: 600;
    margin-right: 4px;
  }
  .mana-badge {
    display: inline-block;
    background: rgba(137, 180, 250, 0.12);
    color: var(--blue);
    border-radius: 4px;
    padding: 0 4px;
    font-size: 0.68rem;
    margin-right: 4px;
  }
  .reason-text { color: var(--text2); }
  .alts {
    color: var(--text3);
    font-size: 0.68rem;
    font-style: italic;
    margin-top: 3px;
  }
</style>
</head>

function renderBoard(cards) {
  if (!cards || !cards.length) return '<span class="empty">no permanents</span>';
  return cards.map(function(c) {
    var cls = c.is_creature ? 'card creature' : 'card other';
    var pt = c.is_creature ? '<span class="pt">' + c.power + '/' + c.toughness + '</span>' : '';
    return '<span class="' + cls + '">' + c.name + ' ' + pt + '</span>';
  }).join(' ');
}

function renderHand(cards) {
  if (!cards || !cards.length) return '';
  var spells = cards.filter(function(c) { return !c.is_land; });
  var lands = cards.filter(function(c) { return c.is_land; }).length;
  var h = spells.slice(0, 4).map(function(c) {
    return '<span class="hcard">' + c.name + '</span>';
  }).join(' ');
  if (spells.length > 4) h += ' <span class="hcard">+' + (spells.length - 4) + ' more</span>';
  if (lands) h += ' <span class="hcard land">' + lands + ' land' + (lands > 1 ? 's' : '') + '</span>';
  return h;
}

function renderReason(r) {
  var h = '';
  // Chain badges for combo turns
  if (r.storm_count !== undefined && r.storm_count >= 2) {
    h += '<span class="chain-badge">Storm #' + (r.storm_count + 1) + '</span>';
    if (r.mana_after !== undefined) {
      h += '<span class="mana-badge">' + r.mana_after + ' mana left</span>';
    }
  }
  // Main reasoning text
  h += '<span class="reason-text">' + (r.reasoning || '') + '</span>';
  // Alternatives
  if (r.alternatives && r.alternatives.length > 0) {
    var meaningful = r.alternatives.filter(function(a) {
      return Math.abs((r.ev || 0) - a.ev) > 2;
    });
    if (meaningful.length > 0) {
      h += '<div class="alts">Also considered: ';
      h += meaningful.map(function(a) { return a.name; }).join(', ');
      h += '</div>';
    }
  }
  return h;
}

function render() {
  var d = DATA;
  if (!d) { document.body.innerHTML = '<h1>No data</h1>'; return; }
  var p1 = d.p1_short;
  var p2 = d.p2_short;

  document.getElementById('info').innerHTML =

    Math.min(d.match_score[0], d.match_score[1]) +
    ' (seed ' + d.seed + ')';

  var tabsEl = document.getElementById('tabs');
  var panelsEl = document.getElementById('panels');

  d.games.forEach(function(g, gi) {
    var isP1Win = g.winner === d.deck1;

    // Tab
    var tab = document.createElement('div');
    tab.className = 'tab' + (gi === 0 ? ' active' : '');
    tab.innerHTML = 'Game ' + g.game_num +
      '<small style="color:' + (isP1Win ? 'var(--green)' : 'var(--red)') + '">' +
      g.winner + ' T' + g.turns + '</small>';
    tab.onclick = (function(idx) {
      return function() {
        var at = document.querySelectorAll('.tab');
        var ap = document.querySelectorAll('.panel');
        for (var i = 0; i < at.length; i++) at[i].className = 'tab';
        for (var i = 0; i < ap.length; i++) ap[i].className = 'panel';
        tab.className = 'tab active';
        document.getElementById('gp' + idx).className = 'panel active';
      };
    })(gi);
    tabsEl.appendChild(tab);

    // Panel
    var panel = document.createElement('div');
    panel.className = 'panel' + (gi === 0 ? ' active' : '');
    panel.id = 'gp' + gi;

    // Build rows
    var rows = '';
    var lastTurn = -1;

    g.rows.forEach(function(r) {
      var isP1 = r.who_idx === 0;
      var isAtk = r.action_type === 'attack';
      var isLethal = r.reasoning && r.reasoning.indexOf('Lethal') >= 0;
      var turnStart = r.turn !== lastTurn;
      lastTurn = r.turn;

      var rowCls = isLethal ? 'lethal' : isAtk ? 'atk' : '';
      if (turnStart) rowCls += ' turn-start';

      var actCls = 'col-action ';
      if (r.action_type === 'land') actCls += 'land';
      else if (isLethal) actCls += 'lethal';
      else if (isAtk) actCls += 'attack';
      else actCls += 'spell';

      var sl = r.p1_life;
      var bl = r.p2_life;

      rows += '<tr class="' + rowCls + '">';
      rows += '<td class="col-turn">' + (turnStart ? r.turn : '') + '</td>';
      rows += '<td class="col-who ' + (isP1 ? 'p1' : 'p2') + '">' + r.who + '</td>';
      rows += '<td class="col-life p1' + (sl <= 5 ? ' danger' : '') + '">' + sl + '</td>';
      rows += '<td class="col-life p2' + (bl <= 5 ? ' danger' : '') + '">' + bl + '</td>';
      rows += '<td class="col-board">' + renderBoard(r.p1_board) + '</td>';
      rows += '<td class="col-board">' + renderBoard(r.p2_board) + '</td>';
      rows += '<td class="col-hand">' + renderHand(r.hand) + '</td>';
      rows += '<td class="' + actCls + '">' + r.action + '</td>';
      rows += '<td class="col-reason">' + renderReason(r) + '</td>';
      rows += '</tr>';
    });

    panel.innerHTML =
      '<div class="header">' +
        '<div class="header-result">' + g.winner + ' wins in ' + g.turns + ' turns (' + g.win_condition + ')</div>' +
        '<div class="header-stats">' +
          p1 + ': ' + g.p1_spells + ' spells, ' + g.p1_final_life + '&#9829; &nbsp;|&nbsp; ' +
          p2 + ': ' + g.p2_spells + ' spells, ' + g.p2_final_life + '&#9829;' +
          ' <span class="badge">' + g.score[0] + ' &ndash; ' + g.score[1] + '</span>' +
        '</div>' +
      '</div>' +
      '<table>' +
        '<thead><tr>' +
          '<th style="width:30px">Turn</th>' +
          '<th style="width:60px">Player</th>' +
          '<th style="width:34px">' + p1 + '</th>' +
          '<th style="width:34px">' + p2 + '</th>' +
          '<th>' + p1 + ' Board</th>' +
          '<th>' + p2 + ' Board</th>' +
          '<th>Hand</th>' +
          '<th>Action</th>' +
          '<th>AI Reasoning</th>' +
        '</tr></thead>' +
        '<tbody>' + rows + '</tbody>' +
      '</table>';

    panelsEl.appendChild(panel);
  });
}
