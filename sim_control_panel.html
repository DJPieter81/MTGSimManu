<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MTG Sim Control Panel</title>
<style>

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    --amber: #d97706; --amber-light: #fef3c7;
    --red: #dc2626; --red-light: #fee2e2;
    --teal: #0d9488; --teal-light: #ccfbf1;
    --pink: #db2777; --pink-light: #fce7f3;
  }
  body { font-family: 'Inter', 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); }
  .mono { font-family: 'JetBrains Mono', monospace; font-size: 12px; }
  .header { background: #fff; padding: 24px 28px 18px; border-bottom: 1px solid var(--border); box-shadow: 0 1px 3px rgba(0,0,0,.04); }
  .header h1 { font-size: 22px; font-weight: 800; letter-spacing: -.5px; display: flex; align-items: center; gap: 12px; }
  .header h1 .icon { width: 32px; height: 32px; border-radius: 8px; background: var(--accent-light); display: flex; align-items: center; justify-content: center; font-size: 18px; }
  .header .sub { font-size: 13px; color: var(--muted); margin-top: 4px; }
  .format-bar { display: flex; gap: 8px; margin-top: 16px; }
  .chip { padding: 6px 14px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all .15s;
    border: 1.5px solid var(--border); background: var(--surface); color: var(--muted); }
  .chip.active { border-color: var(--accent); background: var(--accent-light); color: var(--accent-text); }
  .chip:hover { border-color: var(--accent); }
  .chip-sm { padding: 4px 12px; border-radius: 6px; font-size: 11px; font-weight: 700; }
  .tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); padding: 0 28px; background: #fff; }
  .tab { padding: 10px 20px; font-size: 13px; font-weight: 600; color: var(--muted); border-bottom: 2px solid transparent; cursor: pointer; transition: all .15s; }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab:hover { color: var(--accent); }
  .body { padding: 20px 28px; max-width: 920px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px; margin-bottom: 12px; box-shadow: 0 1px 2px rgba(0,0,0,.03); }
  .label { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; display: block; }
  .stats { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 12px; margin-bottom: 20px; }
  .stat-val { font-size: 28px; font-weight: 800; font-family: 'JetBrains Mono', monospace; }
  .stat-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .open-bar { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .open-bar a { font-size: 13px; font-weight: 600; text-decoration: none; padding: 4px 12px; border-radius: 6px; transition: all .15s; }
  .open-bar a:hover { filter: brightness(.9); }
  .hist-header { display: grid; grid-template-columns: 1fr 80px 140px; gap: 8px; padding: 9px 12px; font-size: 10px; font-weight: 700; color: var(--muted); letter-spacing: .5px; }
  .hist-row { display: grid; grid-template-columns: 1fr 80px 140px; gap: 8px; padding: 9px 12px; border-radius: 8px; align-items: center; font-size: 13px; text-decoration: none; color: inherit; transition: all .1s; }
  .hist-row:nth-child(even) { background: #fafafa; }
  .hist-row.latest { background: var(--amber-light); border-left: 3px solid var(--amber); }
  .hist-row.clickable { cursor: pointer; }
  .hist-row.clickable:hover { background: var(--accent-light); }
  .tag { font-size: 10px; padding: 2px 8px; border-radius: 10px; font-weight: 700; letter-spacing: .4px; text-transform: uppercase; display: inline-block; }
  select, input[type="number"] { background: #fff; border: 1.5px solid var(--border); border-radius: 8px; color: var(--text); padding: 7px 10px; font-size: 13px; outline: none; transition: border .15s; }
  select:focus, input:focus { border-color: var(--accent); }
  select { width: 100%; }
  input[type="number"] { width: 80px; font-family: 'JetBrains Mono', monospace; }
  .row { display: flex; gap: 12px; margin-bottom: 12px; }
  .row > div { flex: 1; }
  .row > div.narrow { flex: 0 0 100px; }
  .deck-grid { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
  .deck-chip { padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 600; cursor: pointer; transition: all .12s;
    border: 1.5px solid #e5e7eb; background: #fff; color: var(--muted); }
  .deck-chip.active { border-color: var(--accent); background: var(--accent-light); color: var(--accent-text); }
  .deck-chip:hover { border-color: var(--accent); }
  .check-row { display: flex; align-items: flex-start; cursor: pointer; padding: 6px 0; gap: 10px; }
  .check-box { width: 18px; height: 18px; border-radius: 4px; border: 2px solid #d1d5db; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px; transition: all .15s; }
  .check-box.checked { border-color: var(--accent); background: var(--accent); }
  .check-box.checked::after { content: '\2713'; color: #fff; font-size: 12px; font-weight: 800; }
  .check-label { font-size: 13px; font-weight: 600; }
  .check-desc { font-size: 11px; color: var(--muted); margin-top: 1px; }
  .btn { background: var(--accent); color: #fff; border: none; border-radius: 8px; padding: 10px 24px; font-size: 14px; font-weight: 700; cursor: pointer; box-shadow: 0 1px 3px rgba(124,58,237,.3); }
  .btn:hover { filter: brightness(.9); }
  .btn-sec { background: #fff; color: var(--accent); border: 1.5px solid var(--border); border-radius: 8px; padding: 8px 16px; font-size: 13px; font-weight: 600; cursor: pointer; }
  .btn-sm { padding: 4px 12px; font-size: 11px; }
  .prompt-box { background: #1e1b2e; border: 1px solid #312e45; border-radius: 10px; padding: 16px; font-family: 'JetBrains Mono', monospace; font-size: 12px; color: #a5f3a0; white-space: pre-wrap; line-height: 1.6; margin-top: 12px; }
  .filter-bar { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; }
  .panel { display: none; }
  .panel.active { display: block; }
  .guide-select { margin-left: 28px; margin-top: 6px; max-width: 260px; display: none; }
  .guide-select.visible { display: block; }
</style>
</head>
<body>
<div class="header">
  <h1><span class="icon">&#9876;</span> MTG Sim Control Panel</h1>
  <div class="sub">Manage simulations, track runs, configure outputs</div>
  <div class="format-bar">
    <button class="chip active" data-format="legacy" onclick="switchFormat('legacy')">Legacy (<span id="legacy-count">36</span>)</button>
    <button class="chip" data-format="modern" onclick="switchFormat('modern')">Modern (<span id="modern-count">15</span>)</button>
  </div>
</div>
<div class="tabs">
  <div class="tab active" data-tab="history" onclick="switchTab('history')">History</div>
  <div class="tab" data-tab="newrun" onclick="switchTab('newrun')">New Run</div>
  <div class="tab" data-tab="artifacts" onclick="switchTab('artifacts')">Artifacts</div>
</div>
<div class="body">
  <div class="card" style="padding:10px 16px;margin-bottom:12px"><div class="open-bar">
    <span style="font-size:13px;font-weight:700">Open:</span><span id="open-links"></span>
  </div></div>

    <div class="card" id="history-table"></div>
  </div>
  <div class="panel" id="panel-newrun">

      <div style="display:flex;gap:8px;margin-bottom:16px" id="run-type-chips"></div>
      <div id="run-config"></div>
    </div>
    <div class="card">

    </div>
    <button class="btn" onclick="generateTask()">Generate Task</button>

      <div style="display:flex;gap:8px;margin-top:8px">
        <button class="btn-sec" onclick="copyPrompt()">Copy to clipboard</button>

    </div>
  </div>

function fmt(iso) {
  if (!iso) return '\u2014';
  const d = new Date(iso);
  const ago = Math.floor((Date.now() - d) / 3600000);
  const rel = ago < 1 ? '< 1h ago' : ago < 24 ? ago + 'h ago' : Math.floor(ago / 24) + 'd ago';
  return d.toLocaleDateString('en-GB',{day:'2-digit',month:'short'}) + ' ' +
         d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'}) + ' (' + rel + ')';
}

}
function deckOptions(sel) {
  return '<option value="">Select...</option>' + getDecks().map(d =>
    `<option value="${d}" ${d===sel?'selected':''}>${d}</option>`).join('');
}
function rowDesc(r) {
  if (r.type === 'matrix') return `${r.decks||'?'}d × ${r.n||'?'}g`;
  if (r.d1 && r.d2) return `${r.d1} vs ${r.d2}`;
  if (r.d1) return r.d1;
  return r.file.replace(/\.(json|txt|html)$/, '');
}
function rowExtra(r) {
  const p = [];
  if (r.seed) p.push('s' + r.seed);
  if (r.size_kb) p.push(r.size_kb + 'KB');
  if (r.count && r.count > 1) p.push('×' + r.count);
  return p.join(' · ');
}
function isClickable(r) { return !!r.path; }
function fileUrl(r) { return getBase() + '/' + r.path; }

// ── Switching ─────────────────────────────────────────────────────────
function switchFormat(f) {
  format = f; selectedDecks = new Set(getDecks());
  deck1 = ''; deck2 = ''; guideDeck = ''; histFilter = 'all';
  document.querySelectorAll('[data-format]').forEach(el => el.classList.toggle('active', el.dataset.format === f));
  render();
}
function switchTab(t) {
  document.querySelectorAll('.tab').forEach(el => el.classList.toggle('active', el.dataset.tab === t));
  document.querySelectorAll('.panel').forEach(el => el.classList.toggle('active', el.id === 'panel-' + t));
}

// ── Render ────────────────────────────────────────────────────────────
function render() {
  const allRuns = getHistory();
  const base = getBase();
  const decks = getDecks();

  // Type counts
  const typeCounts = {};
  allRuns.forEach(r => { const k = r.type === 'bo3-log' ? 'bo3' : r.type; typeCounts[k] = (typeCounts[k]||0) + 1; });

  const filtered = histFilter === 'all' ? allRuns :
    allRuns.filter(r => r.type === histFilter || r.tag === histFilter ||
      (histFilter === 'bo3' && (r.type === 'bo3' || r.type === 'bo3-log')));
  const matrixRuns = allRuns.filter(r => r.type === 'matrix');
  const latest = allRuns[0];

  // Tab count
  document.querySelector('[data-tab="history"]').textContent = `History (${allRuns.length})`;

  // Open links
  let links = '';
  if (format === 'modern') {
    links = `<a style="color:var(--blue);background:var(--blue-light);border:1px solid #2563eb33" href="${base}/modern_meta_matrix_full.html" target="_blank">Modern Matrix</a>`
           +`<a style="color:var(--green);background:var(--green-light);border:1px solid #05966933" href="${base}/sim_control_panel.html" target="_blank">Control Panel</a>`;
  } else {
    links = `<a style="color:var(--blue);background:var(--blue-light);border:1px solid #2563eb33" href="${base}/results/mtg_meta_matrix.html" target="_blank">Legacy Matrix</a>`
           +`<a style="color:var(--red);background:var(--red-light);border:1px solid #dc262633" href="${base}/results/audit_dashboard.html" target="_blank">Audit</a>`
           +`<a style="color:var(--green);background:var(--green-light);border:1px solid #05966933" href="${base}/results/game_replay.html" target="_blank">Replay</a>`
           +`<a style="color:var(--pink);background:var(--pink-light);border:1px solid #db277733" href="${base}/results/metagame_report.html" target="_blank">Meta Report</a>`
           +`<a style="color:var(--accent);background:var(--accent-light);border:1px solid #7c3aed33" href="${base}/results/player_guide.html" target="_blank">Player Guide</a>`;
  }
  document.getElementById('open-links').innerHTML = links;

  // Stats
  document.getElementById('stats-row').innerHTML = [
    {l:'Total items',v:allRuns.length},
    {l:'Latest',v:latest?fmt(latest.ts).split('(')[0].trim():'\u2014',s:latest?(fmt(latest.ts).match(/\(.*\)/)||[''])[0]:'',small:true},
    {l:'Matrix runs',v:matrixRuns.length,s:matrixRuns.length?Math.max(...matrixRuns.map(r=>r.decks||0))+'d max':''},
    {l:'Traces/Bo3s',v:(typeCounts.trace||0)+(typeCounts.bo3||0)},
  ].map(s=>`<div class="card"><span class="label">${s.l}</span>
    <div ${s.small?'class="mono" style="font-size:14px;color:var(--amber);font-weight:700"':'class="stat-val"'}>${s.v}</div>
    ${s.s?`<div class="stat-sub">${s.s}</div>`:''}</div>`).join('');

  // Filter chips
  document.getElementById('filter-bar').innerHTML = FILTER_TYPES.map(ft => {
    const cnt = ft.k === 'all' ? allRuns.length : ft.k === 'bo3' ? (typeCounts.bo3||0) : (typeCounts[ft.k]||0);
    if (cnt === 0 && ft.k !== 'all') return '';
    return `<button class="chip chip-sm ${histFilter===ft.k?'active':''}" onclick="histFilter='${ft.k}';render()">${ft.l} (${cnt})</button>`;
  }).join('');

  // History table
  let hist = '<div class="hist-header"><span>DESCRIPTION</span><span>TYPE</span><span>DATE</span></div>';
  filtered.forEach((r, i) => {
    const clickable = isClickable(r);
    const extra = rowExtra(r);
    const inner = `<div><span class="mono" style="color:${clickable?'var(--blue)':'var(--text)'}">${rowDesc(r)}</span>${extra?`<span style="font-size:10px;color:var(--muted);margin-left:8px">${extra}</span>`:''}</div>
      ${tagHtml(r.tag)}
      <span style="font-size:12px;color:${i===0?'var(--amber)':'var(--muted)'}">${fmt(r.ts)}</span>`;
    if (clickable) {
      hist += `<a href="${fileUrl(r)}" target="_blank" class="hist-row clickable ${i===0?'latest':''}">${inner}</a>`;
    } else {
      hist += `<div class="hist-row ${i===0?'latest':''}">${inner}</div>`;
    }
  });
  if (filtered.length === 0) hist += '<div style="padding:20px;text-align:center;color:var(--muted);font-size:13px">No entries found</div>';
  document.getElementById('history-table').innerHTML = hist;

  // Run type chips
  document.getElementById('run-type-chips').innerHTML = [
    {k:'matrix',l:'Full Matrix'},{k:'matchup',l:'Head-to-Head'},{k:'bo3',l:'Single Bo3'},{k:'field',l:'Field Sweep'}
  ].map(t => `<button class="chip ${runType===t.k?'active':''}" onclick="setRunType('${t.k}')">${t.l}</button>`).join('');

  // Run config
  let cfg = '';
  if (runType === 'matrix') {
    cfg += `<div class="row"><div><span class="label">Games per pair</span>
      <input type="number" value="${gamesPerPair}" onchange="gamesPerPair=+this.value" min="5" step="5"></div>
      <div style="text-align:right;padding-top:20px"><span class="mono" style="color:var(--accent);font-weight:700">${selectedDecks.size}</span>
      <span style="font-size:12px;color:var(--muted)"> / ${decks.length} decks selected</span></div></div>`;
    cfg += `<span class="label">Include Decks</span>
      <div style="display:flex;gap:8px;margin-bottom:8px">
        <button class="btn-sec btn-sm" onclick="selectAll()">All</button>
        <button class="btn-sec btn-sm" onclick="selectNone()">None</button></div>
      <div class="deck-grid">${decks.map(d =>
        `<span class="deck-chip ${selectedDecks.has(d)?'active':''}" onclick="toggleDeck('${d.replace(/'/g,"\\'")}')">${d}</span>`
      ).join('')}</div>`;
  } else if (runType === 'matchup') {
    cfg += `<div class="row"><div><span class="label">Deck 1</span>
      <select onchange="deck1=this.value">${deckOptions(deck1)}</select></div>
      <div><span class="label">Deck 2</span>
      <select onchange="deck2=this.value">${deckOptions(deck2)}</select></div>
      <div class="narrow"><span class="label">Games</span>
      <input type="number" value="${gamesPerPair}" onchange="gamesPerPair=+this.value" min="5"></div></div>`;
  } else if (runType === 'bo3') {
    cfg += `<div class="row"><div><span class="label">Deck 1</span>
      <select onchange="deck1=this.value">${deckOptions(deck1)}</select></div>
      <div><span class="label">Deck 2</span>
      <select onchange="deck2=this.value">${deckOptions(deck2)}</select></div></div>
      <div class="row">
      <div class="narrow"><span class="label">Seed</span>
      <input type="number" value="${seed}" onchange="seed=+this.value"></div>
      <div class="narrow"><span class="label">Matches</span>
      <input type="number" value="${bo3Count}" onchange="bo3Count=Math.max(1,+this.value);render()" min="1" max="100">
      <span style="font-size:11px;color:var(--muted);margin-left:4px">Bo3${bo3Count>1?'s':''}</span></div>
      <div style="flex:1;display:flex;align-items:flex-end;padding-bottom:2px">
        <div class="check-row" onclick="toggleOutput('bo3Replay')">
          <div class="check-box ${outputs.bo3Replay?'checked':''}"></div>
          <div><div class="check-label">Generate HTML replay</div></div></div></div></div>`;
  } else if (runType === 'field') {
    cfg += `<div class="row"><div><span class="label">Deck</span>
      <select onchange="deck1=this.value">${deckOptions(deck1)}</select></div>
      <div class="narrow"><span class="label">Games</span>
      <input type="number" value="${gamesPerPair}" onchange="gamesPerPair=+this.value" min="5"></div></div>`;
  }
  document.getElementById('run-config').innerHTML = cfg;

  // Output checks
  const checks = [
    {k:'dashboard',l:'Rebuild metagame dashboard',d:'Heatmap matrix, tier chips, weighted WR'},
    {k:'replays',l:'Generate outlier replays',d:'Bo3 HTML replays for top 3 suspicious matchups'},
    {k:'audit',l:'Run meta audit',d:'Outlier detection, strategy audit, audit_dashboard.html'},
  ];
  let chk = checks.map(o => `<div class="check-row" onclick="toggleOutput('${o.k}')">
    <div class="check-box ${outputs[o.k]?'checked':''}"></div>
    <div><div class="check-label">${o.l}</div><div class="check-desc">${o.d}</div></div></div>`).join('');
  chk += `<div style="border-top:1px solid var(--border);margin-top:8px;padding-top:8px">
    <div class="check-row" onclick="toggleOutput('deckGuide')">
      <div class="check-box ${outputs.deckGuide?'checked':''}"></div>
      <div><div class="check-label">Generate deck guide</div>
      <div class="check-desc">Mulligan analysis, matchup guide, sideboard plans, hand archetypes</div></div></div>
    <div class="guide-select ${outputs.deckGuide?'visible':''}">
      <span class="label" style="margin-bottom:4px">Deck to guide</span>
      <select onchange="guideDeck=this.value">${deckOptions(guideDeck)}</select>
    </div></div>`;
  chk += `<div style="border-top:1px solid var(--border);margin-top:8px;padding-top:8px">
    <div class="check-row" onclick="toggleOutput('gitPush')">
      <div class="check-box ${outputs.gitPush?'checked':''}"></div>
      <div><div class="check-label">Git commit & push</div>
      <div class="check-desc">Stage results, commit with summary, push to origin main</div></div></div></div>`;
  document.getElementById('output-checks').innerHTML = chk;

  // Artifacts — HTML files are clickable
  let art = '<div class="card"><span class="label">HTML Dashboards & Reports</span>';
  allRuns.filter(r => r.path && r.path.endsWith('.html')).forEach(r => {
    const tc = TAG_COLORS[r.tag] || TAG_COLORS.report;
    art += `<a href="${fileUrl(r)}" target="_blank" style="text-decoration:none;display:block">
      <div style="display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:8px;background:var(--bg);margin-top:6px;cursor:pointer">
        <div style="width:8px;height:8px;border-radius:50%;background:${tc[0]}"></div>
        <span class="mono" style="flex:1;color:var(--blue)">${r.file}</span>
        ${tagHtml(r.tag)}
        ${r.size_kb?`<span style="font-size:10px;color:var(--muted)">${r.size_kb}KB</span>`:''}
      </div></a>`;
  });
  art += '</div><div class="card"><span class="label">Data & Log Files</span>';
  allRuns.filter(r => r.path && !r.path.endsWith('.html')).forEach(r => {
    art += `<a href="${fileUrl(r)}" target="_blank" style="text-decoration:none;display:block">
      <div style="display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:8px;background:var(--bg);margin-top:6px;cursor:pointer">
        <span class="mono" style="flex:1;color:var(--blue)">${r.file}</span>
        ${tagHtml(r.tag)}
        <span style="font-size:11px;color:var(--muted)">${rowDesc(r)}</span>
      </div></a>`;
  });
  art += '</div>';
  document.getElementById('panel-artifacts').innerHTML = art;
  document.getElementById('prompt-output').style.display = 'none';
}

// ── Actions ──────────────────────────────────────────────────────────
function setRunType(t) { runType = t; render(); }
function toggleDeck(d) { selectedDecks.has(d) ? selectedDecks.delete(d) : selectedDecks.add(d); render(); }
function selectAll() { selectedDecks = new Set(getDecks()); render(); }
function selectNone() { selectedDecks.clear(); render(); }
function toggleOutput(k) { outputs[k] = !outputs[k]; render(); }

function generateTask() {
  const repo = format === 'legacy' ? 'MTGSimClaude (Legacy) at ~/MTGSimManu/MTGSimClaude' : 'MTGSimManu (Modern) at ~/MTGSimManu/MTGSimManu/MTGSimManu';
  const deckList = [...selectedDecks]; const allDecks = getDecks();
  let step = 1, lines = [`Run simulation in ${repo}:\n`];
  if (runType === 'matrix') {
    const deckArg = deckList.length === allDecks.length ? '' : ' ' + deckList.join(' ');
    lines.push(`${step++}. Run: python3 run_meta.py --matrix${deckArg} -n ${gamesPerPair}${format==='modern'?' --save':''}`);
    lines.push(`   Decks (${deckList.length}): ${deckList.join(', ')}`);
  } else if (runType === 'matchup') {
    lines.push(`${step++}. Run: python3 run_meta.py --matchup ${deck1||'deck1'} ${deck2||'deck2'} -n ${gamesPerPair}`);
  } else if (runType === 'bo3') {
    const d1 = deck1||'deck1', d2 = deck2||'deck2';
    if (bo3Count === 1) {
      const flag = format === 'legacy' ? '--verbose' : '--bo3';
      lines.push(`${step++}. Run: python3 run_meta.py ${flag} "${d1}" "${d2}" -s ${seed}`);
    } else {
      lines.push(`${step++}. Run ${bo3Count} Bo3 matches between "${d1}" and "${d2}" starting at seed ${seed} (increment by 1000 per match)`);
      lines.push('   Seeds: ' + Array.from({length:bo3Count},(_,i)=>seed+i*1000).join(', '));
    }
    if (outputs.bo3Replay) lines.push(`${step++}. Generate interactive HTML Bo3 replay(s) using /mtg-bo3-replayer-v2 skill`);
  } else if (runType === 'field') {
    lines.push(`${step++}. Run: python3 run_meta.py --field ${deck1||'deck1'} -n ${gamesPerPair}`);
  }
  if (outputs.dashboard) lines.push(`${step++}. Rebuild the metagame matrix dashboard (use /mtg-meta-matrix skill)`);
  if (outputs.replays) lines.push(`${step++}. Generate Bo3 replays for the 3 most interesting outlier matchups (use /mtg-bo3-replayer-v2 skill, seeds 80000+)`);
  if (outputs.audit) lines.push(`${step++}. Run meta_audit.py to generate audit_dashboard.html`);
  if (outputs.deckGuide) lines.push(`${step++}. Generate a comprehensive deck guide for "${guideDeck||'selected deck'}" (use /mtg-deck-guide skill). Include mulligan analysis, matchup guide, sideboard plans, and key hand archetypes.`);
  if (outputs.gitPush) lines.push(`${step++}. Git add all new/changed result files, replays, and dashboards. Commit with a descriptive message summarizing what was run (decks, games/pair, outputs generated). Push to origin main.`);
  lines.push('\nPresent all generated files when done.');
  document.getElementById('prompt-text').textContent = lines.join('\n');
  document.getElementById('prompt-output').style.display = 'block';
}

function copyPrompt() {
  const text = document.getElementById('prompt-text').textContent;
  navigator.clipboard?.writeText(text).then(() => {
    const btn = document.querySelector('#prompt-output .btn-sec');
    btn.textContent = 'Copied!'; setTimeout(() => btn.textContent = 'Copy to clipboard', 1500);
  });
}

render();
</script>
</body>
</html>
