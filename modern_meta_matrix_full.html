<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Modern Metagame Matrix — April 2026</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0c0e14;--bg2:#12151e;--bg3:#181c28;--bg4:#1e2333;--tx:#c8cdd8;--tx2:#8891a4;--tx3:#5a6270;
--acc:#60a5fa;--grn:#4ade80;--red:#f87171;--orn:#d97706;--pur:#a78bfa;--cyn:#22d3ee;--gold:#c9a227}
body{background:var(--bg);color:var(--tx);font-family:'Outfit',sans-serif;font-size:13px;overflow-x:hidden}
.wrap{display:flex;height:100vh}
.main{flex:1;overflow:auto;padding:16px 20px;min-width:0}
/* SLIDE-IN DETAIL PANEL */
.det{width:420px;min-width:420px;background:var(--bg2);border-left:1px solid #ffffff0a;overflow-y:auto;
transform:translateX(100%);transition:transform .25s ease}
.det.show{transform:translateX(0)}
.det-inner{padding:20px}
/* HEADER */
h1{font-size:20px;font-weight:700;letter-spacing:-.5px;margin-bottom:2px;color:var(--gold)}
.sub-h{color:var(--tx2);font-size:11px;margin-bottom:14px}
/* CONTROLS */
.ctrls{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
.ctrls label{font-size:10px;color:var(--tx3);text-transform:uppercase;letter-spacing:.5px}
.ctrls select,.ctrls input[type=text]{background:var(--bg3);border:1px solid #ffffff10;color:var(--tx);
padding:5px 8px;border-radius:4px;font-size:11px;font-family:'JetBrains Mono',monospace;outline:none}
.ctrls select:focus,.ctrls input:focus{border-color:var(--acc)}
.toggle-wrap{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--tx2);cursor:pointer}
.toggle-wrap input{accent-color:var(--acc)}
/* TIER CHIPS */
.tiers{margin-bottom:14px}
.tier-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin:6px 0 4px;
padding:2px 6px;border-radius:2px;display:inline-block}
.tier-label.t1{color:#4ade80;background:#4ade8015}
.tier-label.t2{color:#60a5fa;background:#60a5fa15}
.tier-label.t3{color:#d97706;background:#d9770615}
.tier-label.t4{color:#f87171;background:#f8717115}
.tier-row{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:2px}
.rchip{font-family:'JetBrains Mono',monospace;font-size:10px;padding:3px 8px;border-radius:3px;
cursor:pointer;transition:all .15s;white-space:nowrap;border:1px solid transparent}
.rchip:hover{border-color:#ffffff30;transform:translateY(-1px)}
.rchip.sel{border-color:var(--acc);box-shadow:0 0 8px #60a5fa30}
/* LEGEND */
.legend{display:flex;align-items:center;gap:8px;margin-bottom:12px;font-size:10px;color:var(--tx3)}
.legend-bar{height:10px;width:160px;border-radius:3px;
background:linear-gradient(90deg,hsl(0,55%,20%),hsl(24,45%,25%),hsl(60,35%,24%),hsl(100,45%,24%),hsl(140,50%,26%))}
/* MATRIX */
table{border-collapse:collapse;font-family:'JetBrains Mono',monospace;font-size:10px}
th,td{padding:0;text-align:center}
th.ch{height:90px;position:relative;min-width:26px}
th.ch div{position:absolute;bottom:4px;left:50%;transform:rotate(-55deg) translateX(-50%);
transform-origin:bottom left;white-space:nowrap;font-size:8px;color:var(--tx2);font-weight:400;cursor:pointer}
th.ch.hl div{color:var(--acc);font-weight:600}
th.rh{text-align:right;padding-right:6px;font-size:8px;color:var(--tx2);font-weight:400;
white-space:nowrap;cursor:pointer;position:sticky;left:0;background:var(--bg);z-index:1}
th.rh.hl{color:var(--acc);font-weight:600}
td.c{width:26px;height:20px;font-size:9px;font-weight:600;cursor:pointer;transition:opacity .1s;position:relative}
td.c:hover{outline:2px solid #fff;outline-offset:-2px;z-index:2}
td.c.sel{outline:2px solid var(--acc);outline-offset:-2px;z-index:3}
td.mir{background:var(--bg3)!important;color:var(--tx3);cursor:default;font-size:8px}
td.avg{font-size:9px;font-weight:700;padding-left:6px;background:var(--bg);position:sticky;right:0;white-space:nowrap}
/* TOOLTIP */
.ttip{position:fixed;background:#1a1e2e;border:1px solid #ffffff20;border-radius:6px;padding:8px 12px;
pointer-events:none;z-index:100;font-size:11px;box-shadow:0 8px 24px rgba(0,0,0,.5);
opacity:0;transition:opacity .12s;max-width:280px}
.ttip.vis{opacity:1}
.ttip .tw{font-size:20px;font-weight:700;margin-bottom:2px;font-family:'JetBrains Mono',monospace}
.ttip .tl{color:var(--tx2);font-size:10px;line-height:1.5}
/* DETAIL PANEL SHARED */
.close-btn{position:sticky;top:0;z-index:10;background:var(--bg2);padding:10px 16px;
display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #ffffff08}
.close-btn .det-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--tx3)}
.close-btn button{background:none;border:1px solid #ffffff15;color:var(--tx2);width:26px;height:26px;
border-radius:4px;cursor:pointer;font-size:14px}
.close-btn button:hover{background:var(--bg4);color:var(--tx)}
.det h2{font-size:16px;font-weight:700;letter-spacing:-.3px;margin-bottom:4px}
.det .sub{color:var(--tx2);font-size:11px;margin-bottom:10px}
.sec{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--tx3);
margin:16px 0 7px;padding-bottom:4px;border-bottom:1px solid #ffffff08}
/* STATS ROW */
.row{display:flex;justify-content:space-between;padding:3px 0;font-size:12px}
.lbl{color:var(--tx2)}.val{font-family:'JetBrains Mono',monospace;font-weight:600}
/* MATCHUP BARS IN DETAIL */
.mu-row{display:flex;align-items:center;gap:5px;padding:2px 0;cursor:pointer}
.mu-row:hover{background:#ffffff05;border-radius:2px}
.mu-name{width:110px;font-size:9px;color:var(--tx2);text-align:right;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mu-bar{flex:1;height:8px;background:var(--bg3);border-radius:2px;overflow:hidden;max-width:110px}
.mu-fill{height:100%;border-radius:2px}
.mu-val{font-size:10px;font-weight:600;width:32px;text-align:right;font-family:'JetBrains Mono',monospace}
.mu-ms{font-size:9px;color:var(--tx3);width:28px;text-align:right}
/* TIER BADGE */
.tier-badge{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;
border-radius:4px;font-size:12px;font-weight:700;margin-right:8px;flex-shrink:0}
/* PILLS */
.pill{display:inline-block;padding:2px 7px;border-radius:10px;font-size:9px;font-weight:600;
margin:0 3px 3px 0;font-family:'JetBrains Mono',monospace}
.pill-cast{background:#6a8dae18;color:#6a8dae;border:1px solid #6a8dae25}
.pill-dmg{background:#a0404018;color:#f87171;border:1px solid #f8717125}
.pill-fin{background:#c9a22718;color:#c9a227;border:1px solid #c9a22725}
/* FINISHER ROWS */
.fin-row{display:flex;gap:8px;align-items:flex-start;padding:4px 0;border-bottom:1px solid #ffffff06}
.fin-count{font-size:14px;font-weight:700;color:var(--gold);min-width:24px;text-align:right;font-family:'JetBrains Mono',monospace}
.fin-card{font-size:11px;font-weight:600;color:var(--tx)}
.fin-desc{font-size:10px;color:var(--tx3);line-height:1.5;margin-top:1px}
/* SIDEBOARD */
.sb-block{background:var(--bg3);border-radius:4px;padding:8px 10px;margin-bottom:6px}
.sb-head{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.sb-in{color:var(--grn)}.sb-out{color:var(--red)}.sb-cast{color:var(--tx3)}.sb-delta-up{color:var(--grn)}.sb-delta-dn{color:var(--red)}
.sb-line{font-size:10px;margin-bottom:4px;line-height:1.5}
/* NARRATIVE */
.insight-box{background:var(--bg3);border-radius:4px;padding:10px 12px;border-left:3px solid #c9a22740;margin-bottom:8px}
.insight-box p{font-size:11px;color:var(--tx2);line-height:1.65}
/* OVERVIEW SUMMARY */
.overview{background:var(--bg3);border-radius:4px;padding:10px 12px;border-left:3px solid #c9a22740;margin-bottom:8px;font-size:11px;color:var(--tx2);line-height:1.65}
/* STATS GRID */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px}
.stat-box{background:var(--bg3);border-radius:4px;padding:8px 10px;text-align:center}
.stat-box .sv{font-size:18px;font-weight:700;font-family:'JetBrains Mono',monospace;margin-bottom:1px}
.stat-box .sl{font-size:9px;color:var(--tx3);text-transform:uppercase;letter-spacing:.5px}
</style>
</head>

<div class="wrap">

</div>

function sbLines(lines) {
  if (!lines || !lines.length) return '<div style="font-size:10px;color:var(--tx3)">No changes</div>';
  return lines.map(l => {
    if (l.startsWith('IN:')) return `<div class="sb-line sb-in">▲ ${l}</div>`;
    if (l.startsWith('OUT:')) return `<div class="sb-line sb-out">▼ ${l}</div>`;
    if (l.startsWith('SB cards seen:')) return `<div class="sb-line sb-cast">✓ ${l}</div>`;
    if (l.includes('improves')) return `<div class="sb-line sb-delta-up">↑ ${l}</div>`;
    if (l.includes('drops')) return `<div class="sb-line sb-delta-dn">↓ ${l}</div>`;
    return `<div class="sb-line" style="color:var(--tx2)">${l}</div>`;
  }).join('');
}

function getMC(i, j) {
  const ki = Math.min(i,j), kj = Math.max(i,j);
  const p = MC[`${ki},${kj}`];
  if (!p) return null;
  if (i <= j) return p;
  // Flip perspective
  return {
    ...p, d1: p.d2, d2: p.d1,
    d1_wins: p.d2_wins, d2_wins: p.d1_wins,
    sweeps: [p.sweeps[1], p.sweeps[0]],
    went_to_3: p.went_to_3,
    g1_wins: [p.g1_wins[1], p.g1_wins[0]],
    comebacks: [p.comebacks[1], p.comebacks[0]],
    d1_top_casts: p.d2_top_casts, d2_top_casts: p.d1_top_casts,
    d1_top_damage: p.d2_top_damage, d2_top_damage: p.d1_top_damage,
    d1_finishers: p.d2_finishers, d2_finishers: p.d1_finishers,
    d1_sb: p.d2_sb, d2_sb: p.d1_sb,
    insight: p.insight
  };
}

<h2>${decks[idx]}</h2></div>`;
  h += `<div class="sub">${ARCH[decks[idx]]||'?'} · ${MS[decks[idx]]||0}% meta share</div>`;
  h += `<div style="display:flex;gap:16px;margin:10px 0 14px;align-items:flex-end">
<div><div style="font-size:9px;color:var(--tx3);text-transform:uppercase;letter-spacing:.5px">Flat Avg</div>
<div style="font-size:26px;font-weight:700;color:${tc(flat)};font-family:'JetBrains Mono'">${flat.toFixed(1)}%</div></div>

function proInsights(p, i, j) {
  if (!p || !p.avg_turns) return '';
  let ins = [];
  const w = wr(i,j), g1 = p.g1_wins[0], delta = Math.round(w - g1);
  const d1 = decks[i].split(' ')[0], d2 = decks[j].split(' ')[0];

  // G1 vs Match swing
  if (Math.abs(delta) >= 12) {
    if (delta > 0) ins.push('<b>'+d1+"'s SB dominates:</b> G1 WR is "+g1+'% but match WR is '+w.toFixed(0)+'% (+'+delta+"pp). "+p.comebacks[0]+' comebacks from behind.');
    else ins.push('<b>'+d2+' adapts better post-board:</b> '+d1+' has '+g1+'% G1 WR but drops to '+w.toFixed(0)+'% match ('+delta+"pp). Opponent's sideboard plan is more effective.");
  }

  // Sweep asymmetry
  var s1 = p.sweeps[0], s2 = p.sweeps[1], g3 = p.went_to_3;
  if (s1 + s2 > 3 && Math.abs(s1-s2) >= 3) {
    var sweeper = s1 > s2 ? d1 : d2;
    ins.push('<b>Polarized:</b> '+sweeper+' sweeps '+Math.max(s1,s2)+'x vs '+Math.min(s1,s2)+'. When '+sweeper+' wins, it is decisive. But '+g3+'% reach G3.');
  }

  // Speed gap between closers
  if (p.d1_finishers && p.d1_finishers.length && p.d2_finishers && p.d2_finishers.length) {
    var f1 = p.d1_finishers[0], f2 = p.d2_finishers[0];
    if (f1.desc && f2.desc) {
      var m1 = f1.desc.match(/T([0-9.]+)/), m2 = f2.desc.match(/T([0-9.]+)/);
      if (m1 && m2) {
        var t1 = parseFloat(m1[1]), t2 = parseFloat(m2[1]);
        if (Math.abs(t1-t2) >= 1.5) {
          var faster = t1 < t2 ? d1 : d2;
          var fCard = (t1 < t2 ? f1 : f2).card.split(',')[0];
          ins.push('<b>Speed gap:</b> '+faster+' closes with '+fCard+' (T'+Math.min(t1,t2).toFixed(1)+') vs T'+Math.max(t1,t2).toFixed(1)+'. '+Math.abs(t1-t2).toFixed(1)+' turns difference.');
        }
      }
    }
  }

  // Damage source blind spot
  if (w < 45 && p.d2_top_damage && p.d2_top_damage.length) {
    var killer = p.d2_top_damage[0];
    ins.push('<b>'+d1+"'s problem:</b> "+killer.card+' deals '+killer.count+' total damage. Likely outside '+d1+"'s removal range.");
  } else if (w > 75 && p.d1_top_damage && p.d1_top_damage.length) {
    var killer2 = p.d1_top_damage[0];
    ins.push('<b>Why '+d1+' dominates:</b> '+killer2.card+' ('+killer2.count+' dmg) goes unanswered by '+d2+'.');
  }

  // Zero comebacks
  if (p.comebacks[0] === 0 && p.comebacks[1] === 0 && g3 >= 30) {
    ins.push('<b>No comebacks:</b> Despite '+g3+'% going to G3, neither side reverse-swept. G1 play/draw advantage is decisive.');
  }

  if (!ins.length) return '';
  return '<div style="margin:10px 0;padding:10px 14px;background:var(--bg2);border-left:3px solid var(--acc);border-radius:0 6px 6px 0">' +
    '<div style="font-size:9px;text-transform:uppercase;letter-spacing:.8px;color:var(--tx3);margin-bottom:6px;font-weight:700">Strategic Insights</div>' +
    ins.map(function(s){return '<div style="font-size:11px;color:var(--tx2);line-height:1.5;margin-bottom:6px">'+s+'</div>';}).join('') + '</div>';
}

function showMatchup(i, j) {
  selCell = [i,j]; selDeck = null;
  const det = document.getElementById('det'); det.classList.add('show');
  document.getElementById('det-label').textContent = 'Matchup Detail';
  const p = getMC(i, j);
  const w = wr(i,j), rw = wr(j,i);

  let h = `<h2>${decks[i]} <span style="color:var(--tx3)">vs</span> ${decks[j]}</h2>`;
  h += `<div class="sub">${ARCH[decks[i]]||'?'} vs ${ARCH[decks[j]]||'?'} · ${N} Bo3</div>`;
  h += `<div style="font-size:36px;font-weight:700;color:${tc(w)};font-family:'JetBrains Mono';margin:6px 0 10px">${w.toFixed(0)}%</div>`;
  h += `<div class="row"><span class="lbl">Reverse (${decks[j]} wins)</span><span class="val" style="color:${tc(rw)}">${rw.toFixed(0)}%</span></div>`;
  h += `<div class="row"><span class="lbl">Symmetry check</span><span class="val">${(w+rw).toFixed(0)}%</span></div>`;

  if (p) {
    h += proInsights(p, i, j);
    if (p.insight) h += `<div class="insight-box" style="margin-top:10px"><p>${p.insight}</p></div>`;

    h += `<div class="stats-grid">
<div class="stat-box"><div class="sv" style="color:var(--acc)">${p.avg_turns}</div><div class="sl">Avg Turns</div></div>
<div class="stat-box"><div class="sv" style="color:var(--pur)">${p.went_to_3}%</div><div class="sl">Went to G3</div></div>
<div class="stat-box"><div class="sv" style="color:var(--grn)">${p.g1_wins[0]}%</div><div class="sl">${decks[i].split(' ')[0]} G1 Win%</div></div>
<div class="stat-box"><div class="sv" style="color:var(--orn)">${p.comebacks[0]}-${p.comebacks[1]}</div><div class="sl">Comebacks</div></div>
</div>`;

    if (p.d1_finishers && p.d1_finishers.length) {
      h += `<div class="sec">How ${decks[i]} Wins</div>`;
      h += p.d1_finishers.map(f => `<div class="fin-row"><div class="fin-count">${f.count}</div><div><div class="fin-card">${f.card}</div>${f.desc?`<div class="fin-desc">${f.desc}</div>`:''}</div></div>`).join('');
    }
    if (p.d1_top_casts && p.d1_top_casts.length) {
      h += `<div class="sec">Key Cards — ${decks[i]}</div>`;
      h += pills(p.d1_top_casts, 'pill-cast');
      if (p.d1_top_damage && p.d1_top_damage.length) h += '<br>' + pills(p.d1_top_damage, 'pill-dmg');
    }
    if (p.d2_top_casts && p.d2_top_casts.length) {
      h += `<div class="sec">Key Cards — ${decks[j]}</div>`;
      h += pills(p.d2_top_casts, 'pill-cast');
      if (p.d2_top_damage && p.d2_top_damage.length) h += '<br>' + pills(p.d2_top_damage, 'pill-dmg');
    }
    if (p.d2_finishers && p.d2_finishers.length) {
      h += `<div class="sec">How ${decks[j]} Wins</div>`;
      h += p.d2_finishers.map(f => `<div class="fin-row"><div class="fin-count">${f.count}</div><div><div class="fin-card">${f.card}</div></div></div>`).join('');
    }

    // Sideboard
    const hasSb = (p.d1_sb && p.d1_sb.length) || (p.d2_sb && p.d2_sb.length);
    if (hasSb) {
      h += `<div class="sec">Sideboard Guide (from game data)</div>`;
      h += `<div class="sb-block"><div class="sb-head sb-in">${decks[i]}</div>${sbLines(p.d1_sb)}</div>`;
      h += `<div class="sb-block"><div class="sb-head sb-out">${decks[j]}</div>${sbLines(p.d2_sb)}</div>`;
    }
  } else {
    h += `<div style="margin-top:12px;padding:10px;background:var(--bg3);border-radius:4px;font-size:11px;color:var(--tx3)">Card-level data pending verbose run for this matchup.</div>`;
  }

  document.getElementById('det-inner').innerHTML = h;
  render();
}

function render() {
  sort();
  let fd = sorted;
  if (archFilt) fd = fd.filter(i => ARCH[decks[i]] === archFilt);

  // Tier chips
  const rk = [...decks.keys()].sort((a,b) => getWR(b)-getWR(a));
  const ct = getCT();
  const tiers = {t1:[], t2:[], t3:[], t4:[]};
  rk.forEach(i => {
    const w = getWR(i);
    if (w >= ct[0]) tiers.t1.push(i); else if (w >= ct[1]) tiers.t2.push(i);
    else if (w >= ct[2]) tiers.t3.push(i); else tiers.t4.push(i);
  });
  const tl = useWeighted
    ? [['t1',`Tier 1 — Dominant (≥${ct[0]}%)`],['t2',`Tier 2 — Competitive (≥${ct[1]}%)`],['t3',`Tier 3 — Fringe (≥${ct[2]}%)`],['t4','Tier 4 — Struggling']]
    : [['t1',`Tier 1 (≥${ct[0]}%)`],['t2',`Tier 2 (≥${ct[1]}%)`],['t3',`Tier 3 (≥${ct[2]}%)`],['t4','Tier 4']];
  let th = '';
  tl.forEach(([cls, label]) => {
    if (!tiers[cls].length) return;
    th += `<div class="tier-label ${cls}">${label}</div><div class="tier-row">`;
    tiers[cls].forEach(i => {
      const w = getWR(i);
      const isSel = selDeck === i;
      const bg = tierOf(w)[1];
      th += `<div class="rchip ${isSel?'sel':''}" style="background:${bg}18;color:${bg}"
onclick="showDeckProfile(${i})">${decks[i]} <span style="font-size:9px;opacity:.7">${w.toFixed(1)}%</span></div>`;
    });
    th += '</div>';
  });
  document.getElementById('tiers').innerHTML = th;

  // Matrix
  const cols = fd;
  let mt = '<thead><tr><th class="rh" style="min-width:120px"></th>';
  cols.forEach(j => {
    const isHL = hlDeck !== null && hlDeck == j;
    mt += `<th class="ch${isHL?' hl':''}" onclick="showDeckProfile(${j})"><div>${decks[j]}</div></th>`;
  });
  mt += `<th style="font-size:8px;color:var(--tx3);padding-left:6px;text-align:left">${useWeighted?'⚖ WR':'Flat'}</th></tr></thead><tbody>`;

  fd.forEach(i => {
    const isHL = hlDeck !== null && hlDeck == i;
    mt += `<tr><th class="rh${isHL?' hl':''}" onclick="showDeckProfile(${i})">${decks[i]}</th>`;
    cols.forEach(j => {
      if (i === j) { mt += `<td class="c mir">—</td>`; return; }
      const w = wr(i,j);
      const isSel = selCell && ((selCell[0]===i&&selCell[1]===j)||(selCell[0]===j&&selCell[1]===i));
      const isDimmed = (selDeck!==null && selDeck!==i && selDeck!==j) || (hlDeck!==null && hlDeck!=i && hlDeck!=j);
      mt += `<td class="c${isSel?' sel':''}" style="background:${wc(w)};opacity:${isDimmed?.3:1}"
onmouseenter="showTip(event,${i},${j})" onmouseleave="hideTip()"
onclick="showMatchup(${i},${j})">${w.toFixed(0)}</td>`;
    });
    const wr_val = getWR(i);
    const tcolor = tierOf(wr_val)[1];
    mt += `<td class="avg" style="color:${tcolor}">${wr_val.toFixed(1)}%</td></tr>`;
  });

  mt += '</tbody>';
  document.getElementById('matrix').innerHTML = mt;
}

document.getElementById('srt').onchange = render;
document.getElementById('archFlt').onchange = e => { archFilt = e.target.value; render(); };
document.getElementById('hl').onchange = e => { hlDeck = e.target.value || null; render(); };
document.getElementById('wtToggle').onchange = e => { useWeighted = e.target.checked; render(); };

render();
</script>
