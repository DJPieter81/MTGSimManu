name: Abstraction Contract

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run abstraction ratchet
        run: python tools/check_abstraction.py

      - name: Run doc hygiene check
        run: python tools/check_doc_hygiene.py

      - name: Run abstraction-contract pytest
        run: python -m pytest tests/test_abstraction_contract.py tests/test_doc_hygiene.py -q
